<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!--rendering options-->
  <match target="font">
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>

  <!-- web ui fonts -->
  <include prefix="xdg">fontconfig/web-ui-fonts.conf</include>
  <!-- web fonts -->
  <include prefix="xdg">fontconfig/web-fonts.conf</include>
  <!-- win fonts -->
  <include prefix="xdg">fontconfig/win-fonts.conf</include>
  <!-- mac fonts -->
  <include prefix="xdg">fontconfig/mac-fonts.conf</include>
  
  <!-- default sans-serif fonts-->
  <match target="pattern">
	  <test name="family" qual="any">
	    <string>sans-serif</string>
	  </test>
	  <edit name="family" mode="prepend" binding="strong">
	    <string>MiSans Latin VF</string>
	    <string>MiSans VF</string>
	    <string>Twemoji</string>
	  </edit>
  </match>
  
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>cn</string>
    </test>
    <test name="family" compare="contains">
      <string>MiSans Latin VF</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>MiSans VF</string>
    </edit>
  </match>

  <!-- default serif fonts-->
  <match target="pattern">  
	  <test name="family" qual="any">
	    <string>serif</string>
	  </test>
    <edit name="family" mode="prepend" binding="strong">
	    <string>Noto Serif</string>
	    <string>LXGW WenKai</string>
	    <string>Twemoji</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>cn</string>
    </test>
    <test name="family" compare="contains">
      <string>Noto Serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>LXGW WenKai</string>
    </edit>
  </match>

  <!-- default monospace fonts-->
  <match target="pattern">
	  <test name="family" qual="any">
	    <string>monospace</string>
	  </test>
	  <edit name="family" mode="prepend" binding="strong">
	    <string>Fira Code</string>
	    <string>Maple Mono CN</string>
	    <string>Twemoji</string>
	    <string>Symbols Nerd Font Mono</string>
	  </edit>
  </match>
  
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>cn</string>
    </test>
    <test name="family" compare="contains">
      <string>Fira Code</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Maple Mono CN</string>
    </edit>
  </match>
  
  <!-- CJK fonts settings-->
  <match target="pattern">
    <test name="lang">
      <string>zh-HK</string>
    </test>
    <test name="family">
      <string>MiSans VF</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans CJK HK</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-HK</string>
    </test>
    <test name="family">
      <string>LXGW WenKai</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-HK</string>
    </test>
    <test name="family">
      <string>Maple Mono CN</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans Mono CJK HK</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-TW</string>
    </test>
    <test name="family">
      <string>MiSans VF</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-TW</string>
    </test>
    <test name="family">
      <string>LXGW WenKai</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-TW</string>
    </test>
    <test name="family">
      <string>Maple Mono CN</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans Mono CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ja</string>
    </test>
    <test name="family">
      <string>MiSans VF</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ja</string>
    </test>
    <test name="family">
      <string>LXGW WenKai</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ja</string>
    </test>
    <test name="family">
      <string>Maple Mono CN</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans Mono CJK JP</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ko</string>
    </test>
    <test name="family">
      <string>MiSans VF</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans CJK KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ko</string>
    </test>
    <test name="family">
      <string>LXGW WenKai</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Serif CJK KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ko</string>
    </test>
    <test name="family">
      <string>Maple Mono CN</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans Mono CJK KR</string>
    </edit>
  </match>
  
</fontconfig>


<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!--rendering options-->
  <match target="font">
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="lcdfilter" mode="assign">
      <const>lcddefault</const>
    </edit>
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
  </match>

  <!-- web fonts -->
  <match target="pattern">
	  <test name="family" qual="any">
	    <string>system-ui</string>
	  </test>
	  <edit name="family" mode="assign" binding="same">
	    <string>sans-serif</string>
	  </edit>
  </match>
  
  <match target="pattern">
    <test name="family" qual="any">
      <string>ui-monospace</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>monospace</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>ui-sans-serif</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>sans-serif</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any">
      <string>ui-serif</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>serif</string>
    </edit>
  </match>
  
  <!-- replace web sans-serif fonts -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>-apple-system</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>sans-serif</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test name="family" qual="any">
      <string>BlinkMacSystemFont</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>sans-serif</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test name="family" qual="any">
      <string>Segoe UI</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>sans-serif</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test name="family" qual="any">
      <string>Nimbus Sans</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>sans-serif</string>
    </edit>
  </match>
  
  <match target="pattern">
    <test name="family" qual="any">
      <string>Helvetica</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>sans-serif</string>
    </edit>
  </match>
  
  <!-- replace web serif fonts -->
  <!-- replace web monospace fonts -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>Courier</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>monospace</string>
    </edit>
  </match>
  
  <!-- default sans-serif fonts-->
  <match target="pattern">
	  <test name="family" qual="any">
	    <string>sans-serif</string>
	  </test>
	  <edit name="family" mode="prepend" binding="strong">
	    <string>MiSans Latin VF</string>
	    <string>MiSans VF</string>
	    <string>Twemoji</string>
	  </edit>
  </match>
  
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>cn</string>
    </test>
    <test name="family" compare="contains">
      <string>MiSans Latin VF</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>MiSans VF</string>
    </edit>
  </match>

  <!-- default serif fonts-->
  <match target="pattern">  
	  <test name="family" qual="any">
	    <string>serif</string>
	  </test>
    <edit name="family" mode="prepend" binding="strong">
	    <string>Noto Serif</string>
	    <string>Noto Serif CJK SC</string>
	    <string>Twemoji</string>
    </edit>
  </match>

  <!-- default monospace fonts-->
  <match target="pattern">
	  <test name="family" qual="any">
	    <string>monospace</string>
	  </test>
	  <edit name="family" mode="prepend" binding="strong">
	    <string>FiraCode Nerd Font</string>
	    <string>Maple Mono CN</string>
	    <string>Twemoji</string>
	  </edit>
  </match>
  
  <match target="pattern">
    <test name="lang">
      <string>zh-HK</string>
    </test>
    <test name="family">
      <string>MiSans VF</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans CJK HK</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-HK</string>
    </test>
    <test name="family">
      <string>Noto Serif CJK SC</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-HK</string>
    </test>
    <test name="family">
      <string>Maple Mono CN</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans Mono CJK HK</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-TW</string>
    </test>
    <test name="family">
      <string>MiSans VF</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-TW</string>
    </test>
    <test name="family">
      <string>Noto Serif CJK SC</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Serif CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>zh-TW</string>
    </test>
    <test name="family">
      <string>Maple Mono CN</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans Mono CJK TC</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ja</string>
    </test>
    <test name="family">
      <string>MiSans VF</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans CJK JP</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ja</string>
    </test>
    <test name="family">
      <string>Noto Serif CJK SC</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Serif CJK JP</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ja</string>
    </test>
    <test name="family">
      <string>Maple Mono CN</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans Mono CJK JP</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ko</string>
    </test>
    <test name="family">
      <string>MiSans VF</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans CJK KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ko</string>
    </test>
    <test name="family">
      <string>Noto Serif CJK SC</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Serif CJK KR</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="lang">
      <string>ko</string>
    </test>
    <test name="family">
      <string>Maple Mono CN</string>
    </test>
    <edit name="family" binding="strong">
      <string>Noto Sans Mono CJK KR</string>
    </edit>
  </match>
  
</fontconfig>

